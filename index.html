 	<div id="result"></div>
    
<script>
	var context = {name: studentName, major: studentMajor, midterm: midtermScore, final: finalScore};
	var source = 
	var template = handlebars.compile(source);
	var html = template(context);
   
    document.addEventListener('DOMContentLoaded', function() {      
													  
    	document.querySelector('#btn1').onclick = async function(){   
			var response = await fetch('cit5students.json');       
        	
			if(response.ok) {
				var data = await response.json();                

				var tableContents = "<table cellspacing='5'>"
				tableContents += "<b><tr><td>Name</td><td>Major</td><td>Midterm</td><td>Final</td></tr></b>";
					
            	for(i = 0; i < data.length; i++) {
					if(data[i].major === 'CIT') {
                    tableContents += `
						<tr>
						<td> ${data[i].name} </td>
						<td> ${data[i].major} </td>
						<td> ${data[i].midterm} </td>
						<td> ${data[i].final} </td>
						</tr>`;  
                }
				}
					
                tableContents += "</table>";

                document.querySelector('#result').innerHTML = tableContents;
			}
			else {
				document.querySelector('#result').innerHTML = "<b>Error:</b> Data not found";
			}	
    	};
