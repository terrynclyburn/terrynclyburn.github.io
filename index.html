<!DOCTYPE html>
<html><head>  <meta charset="UTF-8">
    <title>Program 5</title>
</head>
<body style='margin-left: 30px;'>

    <h1>Select A Major</h1>
        
    <input type="button" id='btn' value="CIT Majors">
	<input type="button" id='btn' value="Business Majors">

	<h3>We Filter Our Dataset By Major</h3>

             
 	<div id="result"></div>
    
<script>
   
    document.addEventListener('DOMContentLoaded', function() {      
													  
    	document.querySelector('#btn').onclick = async function(){   
			var response = await fetch('cit5students.json');       
        	//console.log(response);
			if(response.ok) {
				var data = await response.json();                

				var tableContents = "<table cellspacing='5'>"
				tableContents += "<b><tr><td>Name</td><td>Major</td><td>Midterm</td><td>Final</td></tr></b>";
					
            	for(i = 0; i < data.length; i++) {
                    tableContents += `
						<tr>
						<td> ${data[i].name} </td>
						<td> ${data[i].major} </td>
						<td> ${data[i].midterm} </td>
						<td> ${data[i].final} </td>
						</tr>`;  
                }
					
                tableContents += "</table>";

                document.querySelector('#result').innerHTML = tableContents;
			}
			else {
				document.querySelector('#result').innerHTML = "<b>Error:</b> Data not found";
			}	
    	};
	
  	});
   
</script>
   
</body>
</html>
