<!DOCTYPE html>
<html><head>  <meta charset="UTF-8">
    <title>Program 5</title>
</head>
<body style='margin-left: 30px;'>

    <h1>Select A Major</h1>
        
    <input type="button" id='btn1' value="CIT Majors">
	<input type="button" id='btn2' value="Business Majors">

	<h3>We Filter Our Dataset By Major</h3>

             
 	<div id="result"></div>
    
<script>
   
    document.addEventListener('DOMContentLoaded', function() {      
													  
    	document.querySelector('#btn1').onclick = async function(){   
			var response = await fetch('cit5students.json');       
        	
			if(response.ok) {
				var data = await response.json();                

				var tableContents = "<table cellspacing='5'>"
				tableContents += "<b><tr><td>Name</td><td>Major</td><td>Midterm</td><td>Final</td></tr></b>";
					
            	for(i = 0; i < data.length; i++) {
                    tableContents += `
						<tr>
						<td> ${data[i].name} </td>
						<td> ${data[i].major} </td>
						<td> ${data[i].midterm} </td>
						<td> ${data[i].final} </td>
						</tr>`;  
                }
					document.querySelector('#btn2').onclick = async function(){   
    var response = await fetch('cit5students.json');       
    
    if(response.ok) {
        var data = await response.json();                

        var tableContents = "<table cellspacing='5'>"
        tableContents += "<tr><th>Name</th><th>Major</th><th>Midterm</th><th>Final</th></tr>";
            
        for(i = 0; i < data.length; i++) {
            if(data[i].major === 'BUS') {           // ← only BUS students
                tableContents += `
                    <tr>
                    <td> ${data[i].name} </td>
                    <td> ${data[i].major} </td>
                    <td> ${data[i].midterm} </td>
                    <td> ${data[i].final} </td>
                    </tr>`;  
            }
        }
            
                tableContents += "</table>";

                document.querySelector('#result').innerHTML = tableContents;
			}
			else {
				document.querySelector('#result').innerHTML = "<b>Error:</b> Data not found";
			}	
    	};
	
  	});
   
</script>
   
</body>
</html>
