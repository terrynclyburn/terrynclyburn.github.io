<!DOCTYPE html>
<html>
    <head> 
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
           
            <title>Program 5</title> 

            <script src= "https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.7/handlebars.min.js"></script>

            <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
	        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
            <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>
    
        <style>
        .btn {margin: 5px}
        </style>

        </head>
<body>
        <div class="container">

            <h1>Select A Major</h1>

                    <div style='padding: 5px;'>

            <button type='button' class="btn btn-primary" onClick="getData('CIT')">CIT Majors</button> 
            <button type='button' class="btn btn-primary" onClick="getData('BUS')">Business Majors</button> 

	        <h3>We Filter Our Dataset By Major</h3>
            
            <div id="studentTable"></div>
            </div>
</body>    


	<script type="text/x-handlebars-template" id="studentTemplate" >
        <table cellspacing="12">

            <tr>
                <th>Name</th>
                <th>Major</th>
                <th>Midterm</th>
                <th>Final</th>
            </tr>
            {{#each rows}}
            <tr>
                <td>{{name}}</td>
                <td>{{major}}</td>
                <td>{{midterm}}</td>
                <td>{{final}}</td>
            </tr>
            {{/each}}
        </table>
    </script>

    <script>
        async function getData(major) {
          var response = await fetch('cit5students.json');
        
        if(response.ok) {
            var data = await response.json();
            var filtered = [];
            for(var i = 0; i < data.length; i++) {
                    if(data[i].major === major) {
                        filtered.push(data[i]);
                    }
                }
            var templateSource = document.getElementById('studentTemplate').innerHTML;
            var template = Handlebars.compile(templateSource);
            var html = template({rows: filtered});
            
            document.querySelector('#studentTable').innerHTML = html;
            } else {
                document.querySelector('#studentTable').innerHTML = "Data not found";
            }
        }

    </script>
</html>
